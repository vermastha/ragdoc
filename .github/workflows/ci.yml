name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (no ML downloads — tests use the hashing embedder)
        run: |
          pip install -e ".[api,dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v
      - name: Retrieval eval (must stay at 100% on the sample set)
        run: python scripts/evaluate_retrieval.py
